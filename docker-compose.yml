version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: bini_health_2026
      MYSQL_DATABASE: bini_health
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: UTC
    command: --default-time-zone='+00:00'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - 6b099ed3-7175-4a78-91f4-44570c84ed27-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-backend
    restart: always
    environment:
      DATABASE_URL: mysql+aiomysql://root:bini_health_2026@db:3306/bini_health
      SECRET_KEY: bini-health-secret-key-2026-very-secure
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-}
      AI_API_KEY: ${AI_API_KEY:-}
      TENCENT_SMS_SECRET_ID: ${TENCENT_SMS_SECRET_ID:-}
      TENCENT_SMS_SECRET_KEY: ${TENCENT_SMS_SECRET_KEY:-}
      TENCENT_SMS_SDK_APP_ID: ${TENCENT_SMS_SDK_APP_ID:-1400920269}
      TENCENT_SMS_SIGN_NAME: ${TENCENT_SMS_SIGN_NAME:-呃唉帮帮网络}
      TENCENT_SMS_TEMPLATE_ID: ${TENCENT_SMS_TEMPLATE_ID:-2201340}
      TENCENT_SMS_APP_KEY: ${TENCENT_SMS_APP_KEY:-7e3c8242bf0799cca367fa18fa47a7ea}
      # [支付配置 PRD v1.0 / Bug 修复] 支付通道敏感字段 AES-256-GCM 加密密钥（base64 32 字节）
      # 生产环境务必通过 .env 覆盖此默认值，并妥善保管
      PAYMENT_CONFIG_ENCRYPTION_KEY: ${PAYMENT_CONFIG_ENCRYPTION_KEY:-jzsuHsRKWp/Xy01k+8d4R2lNBvb3KQTGJJkxQXRjW2A=}
      # [支付配置 PRD v1.0 / Bug 修复] notify_url 默认前缀（不配置则用 request.base_url）
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://newbb.test.bangbangvip.com/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27}
      # [2026-05-04 H5 支付链路 BasePath 修复 v1.0]
      # 后端在拼接 sandbox 收银台 pay_url / 支付宝 return_url 时使用的 H5 完整基地址。
      # 必须与 H5 容器构建时的 NEXT_PUBLIC_BASE_PATH 保持同一前缀（域名 + basePath）。
      # 未来切换到根域名 / 独立子域名时，将本变量改为 https://h5.xxx.com 即可，业务零改动。
      PROJECT_BASE_URL: ${PROJECT_BASE_URL:-https://newbb.test.bangbangvip.com/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27}
      # [订单核销码状态与未支付超时治理 v1.0] 全局支付超时分钟数（默认 15）
      PAYMENT_TIMEOUT_MINUTES: ${PAYMENT_TIMEOUT_MINUTES:-15}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - 6b099ed3-7175-4a78-91f4-44570c84ed27-network

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api
        - NEXT_PUBLIC_BASE_PATH=/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/admin
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-admin
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api
      NEXT_PUBLIC_BASE_PATH: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/admin
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - 6b099ed3-7175-4a78-91f4-44570c84ed27-network

  h5-web:
    build:
      context: ./h5-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api
        - NEXT_PUBLIC_BASE_PATH=/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-h5
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api
      NEXT_PUBLIC_BASE_PATH: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - 6b099ed3-7175-4a78-91f4-44570c84ed27-network

volumes:
  mysql_data:
  uploads_data:

networks:
  6b099ed3-7175-4a78-91f4-44570c84ed27-network:
    driver: bridge
