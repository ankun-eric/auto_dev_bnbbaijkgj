services:
  backend:
    image: crpi-d7zlu3m44f38jufp.cn-guangzhou.personal.cr.aliyuncs.com/noob_ai_apps/6b099ed3-7175-4a78-91f4-44570c84ed27-backend:latest
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\" || wget -qO- http://127.0.0.1:8000/api/health || curl -sf http://127.0.0.1:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    environment:
      DATABASE_URL: mysql+aiomysql://root:xiaokang989aab@gz-cdb-nniq1lmp.sql.tencentcdb.com:27082/bini_health
      SECRET_KEY: bini-health-secret-key-2026-very-secure
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-}
      AI_API_KEY: ${AI_API_KEY:-}
      TENCENT_SMS_SECRET_ID: ${TENCENT_SMS_SECRET_ID:-}
      TENCENT_SMS_SECRET_KEY: ${TENCENT_SMS_SECRET_KEY:-}
      TENCENT_SMS_SDK_APP_ID: ${TENCENT_SMS_SDK_APP_ID:-1400920269}
      TENCENT_SMS_SIGN_NAME: ${TENCENT_SMS_SIGN_NAME:-呃唉帮帮网络}
      TENCENT_SMS_TEMPLATE_ID: ${TENCENT_SMS_TEMPLATE_ID:-2201340}
      TENCENT_SMS_APP_KEY: ${TENCENT_SMS_APP_KEY:-7e3c8242bf0799cca367fa18fa47a7ea}
      STATIC_BASE_URL: ${STATIC_BASE_URL:-https://chat.benne-ai.com}
      PROJECT_BASE_URL: ${PROJECT_BASE_URL:-https://chat.benne-ai.com}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://chat.benne-ai.com}
      PAYMENT_TIMEOUT_MINUTES: ${PAYMENT_TIMEOUT_MINUTES:-15}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-backend


  admin-web:
    image: crpi-d7zlu3m44f38jufp.cn-guangzhou.personal.cr.aliyuncs.com/noob_ai_apps/6b099ed3-7175-4a78-91f4-44570c84ed27-admin-web:latest
    build:
      context: ../admin-web
      dockerfile: ../deploy/Dockerfile.admin
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-admin
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/admin || curl -sf http://127.0.0.1:3000/admin || node -e \"process.exit(1)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_BASE_PATH: /admin
      BACKEND_URL: http://6b099ed3-7175-4a78-91f4-44570c84ed27-backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-admin

  h5-web:
    image: crpi-d7zlu3m44f38jufp.cn-guangzhou.personal.cr.aliyuncs.com/noob_ai_apps/6b099ed3-7175-4a78-91f4-44570c84ed27-h5-web:latest
    build:
      context: ../h5-web
      dockerfile: ../deploy/Dockerfile.h5
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-h5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ || curl -sf http://127.0.0.1:3001/ || node -e \"process.exit(1)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_BASE_PATH: 
      BACKEND_URL: http://6b099ed3-7175-4a78-91f4-44570c84ed27-backend:8000
    expose:
      - "3001"
    depends_on:
      - backend
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-h5

volumes:
  uploads_data:

networks:
  app-network:
    name: 6b099ed3-7175-4a78-91f4-44570c84ed27-network
    driver: bridge
