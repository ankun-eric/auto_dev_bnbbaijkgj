name: Android Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'android-dev'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          
      - name: Create local.properties
        working-directory: flutter_app/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties
          
      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Patch plugin build.gradle files
        run: |
          for GRADLE_FILE in $(find ~/.pub-cache -path "*/record_android*/android/build.gradle" -type f 2>/dev/null); do
            echo "Patching record_android: $GRADLE_FILE"
            sed -i 's/compileSdk\s*=\?\s*flutter\.compileSdkVersion/compileSdk = 35/' "$GRADLE_FILE"
            sed -i 's/compileSdkVersion\s*=\?\s*flutter\.compileSdkVersion/compileSdkVersion 35/' "$GRADLE_FILE"
            sed -i 's/targetSdkVersion\s*=\?\s*flutter\.targetSdkVersion/targetSdkVersion 34/' "$GRADLE_FILE"
            sed -i 's/minSdkVersion\s*=\?\s*flutter\.minSdkVersion/minSdkVersion 21/' "$GRADLE_FILE"
            sed -i 's/minSdk\s*=\?\s*flutter\.minSdkVersion/minSdk = 21/' "$GRADLE_FILE"
          done

          for GRADLE_FILE in $(find ~/.pub-cache -name "build.gradle" -type f 2>/dev/null); do
            if grep -q 'com.android.tools.build:gradle:7' "$GRADLE_FILE" 2>/dev/null; then
              echo "Upgrading AGP in: $GRADLE_FILE"
              sed -i "s|com.android.tools.build:gradle:7\.[0-9.]*|com.android.tools.build:gradle:8.4.1|g" "$GRADLE_FILE"
            fi
          done

      - name: Patch image_gallery_saver to drop deprecated Registrar
        run: |
          PLUGIN_KT=$(find ~/.pub-cache -path "*image_gallery_saver*ImageGallerySaverPlugin.kt" -type f 2>/dev/null | head -1)
          if [ -z "$PLUGIN_KT" ]; then
            echo "image_gallery_saver plugin not found, skipping"
            exit 0
          fi
          echo "Patching Kotlin plugin: $PLUGIN_KT"
          cat > /tmp/_patch_igs.py <<'PYEOF'
          import re, sys, pathlib
          p = pathlib.Path(sys.argv[1])
          src = p.read_text(encoding='utf-8')
          src = re.sub(r'^\s*import\s+io\.flutter\.plugin\.common\.PluginRegistry\.Registrar.*\n', '', src, flags=re.MULTILINE)
          lines = src.splitlines(keepends=True)
          out = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if re.match(r'\s*companion\s+object', line):
                  depth = 0
                  started = False
                  j = i
                  while j < len(lines):
                      depth += lines[j].count('{')
                      depth -= lines[j].count('}')
                      if '{' in lines[j]:
                          started = True
                      j += 1
                      if started and depth <= 0:
                          break
                  i = j
                  continue
              out.append(line)
              i += 1
          p.write_text(''.join(out), encoding='utf-8')
          print('Patched:', p)
          PYEOF
          python3 /tmp/_patch_igs.py "$PLUGIN_KT"
          echo "--- head of patched file ---"
          sed -n '1,40p' "$PLUGIN_KT"

      - name: Build APK
        working-directory: flutter_app
        run: |
          flutter build apk --release --no-tree-shake-icons
          echo "=== Build step complete, searching for APK ==="

      - name: Find and rename APK
        run: |
          echo "=== Searching for APK files ==="
          find flutter_app/ -name "*.apk" -type f 2>/dev/null
          APK_PATH=$(find flutter_app/ -name "app-release.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find flutter_app/ -name "*release*.apk" -type f | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find flutter_app/ -name "*.apk" -type f | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find flutter_app/build/ -type f 2>/dev/null | head -50
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" bini_health_${{ github.event.inputs.version }}.apk
          ls -la bini_health_${{ github.event.inputs.version }}.apk
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Android Build ${{ github.event.inputs.version }}"
          files: bini_health_${{ github.event.inputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
