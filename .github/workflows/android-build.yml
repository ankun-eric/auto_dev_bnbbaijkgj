name: Android Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'android-dev'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          
      - name: Create local.properties
        working-directory: flutter_app/android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties
          
      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get
        
      - name: Build APK
        working-directory: flutter_app
        run: |
          flutter build apk --release --no-tree-shake-icons 2>&1 || true
          echo "=== Searching for APK files ==="
          find build/ -name "*.apk" -type f 2>/dev/null || true
          if [ ! -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "APK not found at expected path, trying direct Gradle build..."
            cd android
            if [ -f gradlew ]; then
              chmod +x gradlew
              ./gradlew assembleRelease --no-daemon
            else
              $FLUTTER_ROOT/bin/cache/artifacts/gradle_wrapper/gradlew assembleRelease --no-daemon -p .
            fi
            cd ..
            echo "=== APK search after Gradle ==="
            find . -name "*.apk" -type f 2>/dev/null || true
          fi

      - name: Rename APK
        run: |
          APK_PATH=$(find flutter_app/ -name "app-release.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find flutter_app/ -name "*.apk" -type f | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            find flutter_app/ -type f -name "*.apk" 2>/dev/null
            find flutter_app/build/ -type d 2>/dev/null | head -30
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" bini_health_${{ github.event.inputs.version }}.apk
          ls -la bini_health_${{ github.event.inputs.version }}.apk
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Android Build ${{ github.event.inputs.version }}"
          files: bini_health_${{ github.event.inputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
