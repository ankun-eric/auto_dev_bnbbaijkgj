name: iOS Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'ios-v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get
      
      - name: Build iOS (no codesign)
        working-directory: flutter_app
        run: flutter build ios --release --no-codesign
      
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r flutter_app/build/ios/iphoneos/Runner.app Payload/
          zip -r bini_health_ios.ipa Payload/
          rm -rf Payload/
      
      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.version }} \
            bini_health_ios.ipa \
            --title "iOS Build ${{ github.event.inputs.version }}" \
            --notes "OCR多图上传功能 - iOS构建（未签名，需使用AltStore等工具安装）"
