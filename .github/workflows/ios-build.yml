name: iOS Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'ios-v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
      
      - name: Get dependencies
        working-directory: flutter_app
        run: |
          rm -f pubspec.lock
          flutter pub get

      - name: Regenerate iOS project
        working-directory: flutter_app
        run: |
          rm -rf ios
          flutter create --platforms ios --org com.binihealth --project-name bini_health .
          flutter pub get

      - name: Update Info.plist permissions
        working-directory: flutter_app
        run: |
          cat > ios/Runner/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>CFBundleDevelopmentRegion</key>
          	<string>zh_CN</string>
          	<key>CFBundleDisplayName</key>
          	<string>宾尼小康</string>
          	<key>CFBundleExecutable</key>
          	<string>$(EXECUTABLE_NAME)</string>
          	<key>CFBundleIdentifier</key>
          	<string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
          	<key>CFBundleInfoDictionaryVersion</key>
          	<string>6.0</string>
          	<key>CFBundleName</key>
          	<string>bini_health</string>
          	<key>CFBundlePackageType</key>
          	<string>APPL</string>
          	<key>CFBundleShortVersionString</key>
          	<string>$(FLUTTER_BUILD_NAME)</string>
          	<key>CFBundleSignature</key>
          	<string>????</string>
          	<key>CFBundleVersion</key>
          	<string>$(FLUTTER_BUILD_NUMBER)</string>
          	<key>LSRequiresIPhoneOS</key>
          	<true/>
          	<key>UILaunchStoryboardName</key>
          	<string>LaunchScreen</string>
          	<key>UIMainStoryboardFile</key>
          	<string>Main</string>
          	<key>UISupportedInterfaceOrientations</key>
          	<array>
          		<string>UIInterfaceOrientationPortrait</string>
          	</array>
          	<key>NSCameraUsageDescription</key>
          	<string>需要访问相机进行舌诊、面诊拍照和药物识别</string>
          	<key>NSPhotoLibraryUsageDescription</key>
          	<string>需要访问相册以上传体检报告和健康相关图片</string>
          	<key>NSMicrophoneUsageDescription</key>
          	<string>需要使用麦克风进行语音问诊</string>
          	<key>NSPhotoLibraryAddUsageDescription</key>
          	<string>需要保存健康报告图片到相册</string>
          </dict>
          </plist>
          PLIST

      - name: Disable code signing
        working-directory: flutter_app
        run: |
          echo 'CODE_SIGNING_REQUIRED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGNING_ALLOWED=NO' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGN_IDENTITY=' >> ios/Flutter/Release.xcconfig
          echo 'CODE_SIGNING_REQUIRED=NO' >> ios/Flutter/Debug.xcconfig
          echo 'CODE_SIGNING_ALLOWED=NO' >> ios/Flutter/Debug.xcconfig
          echo 'CODE_SIGN_IDENTITY=' >> ios/Flutter/Debug.xcconfig
          ruby -e '
            path = "ios/Runner.xcodeproj/project.pbxproj"
            content = File.read(path)
            content.gsub!(/ProvisioningStyle = Automatic/, "ProvisioningStyle = Manual")
            content.gsub!(/CODE_SIGN_STYLE = Automatic/, "CODE_SIGN_STYLE = Manual")
            content.gsub!(/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = .*?;/, "\"CODE_SIGN_IDENTITY[sdk=iphoneos*]\" = \"\";")
            content.gsub!(/DEVELOPMENT_TEAM = .*?;/, "DEVELOPMENT_TEAM = \"\";")
            content.gsub!(/CODE_SIGN_IDENTITY = ".*?";/, "CODE_SIGN_IDENTITY = \"\";")
            content.gsub!(/CODE_SIGN_IDENTITY = .*?;/, "CODE_SIGN_IDENTITY = \"\";")
            content.gsub!(/PROVISIONING_PROFILE_SPECIFIER = ".*?";/, "PROVISIONING_PROFILE_SPECIFIER = \"\";")
            content.gsub!(/buildSettings = \{/) { |m| "#{m}\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;" }
            File.write(path, content)
          '

      - name: Build iOS (no codesign)
        working-directory: flutter_app
        run: |
          set -o pipefail
          flutter build ios --release --no-codesign --config-only
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tail -200
          echo "=== Build output ==="
          find build/derived -name "*.app" -type d 2>/dev/null || echo "No .app found in derived"
          APP=$(find build/derived -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: Runner.app was not produced"; exit 1
          fi
          if [ ! -f "$APP/Runner" ]; then
            echo "ERROR: Runner.app is missing its Runner binary at $APP/Runner"
            ls -la "$APP" || true
            exit 1
          fi
          echo "Runner binary size: $(stat -f%z "$APP/Runner") bytes"

      - name: Create IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find flutter_app/ios/build/derived -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find flutter_app -name "Runner.app" -type d 2>/dev/null | head -1)
          fi
          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            cp -r "$APP_PATH" Payload/
          else
            echo "ERROR: Runner.app not found!"
            find flutter_app -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          zip -r bini_health_ios.ipa Payload/
          rm -rf Payload/
      
      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.version }} \
            bini_health_ios.ipa \
            --title "iOS Build ${{ github.event.inputs.version }}" \
            --notes "iOS构建 ${{ github.event.inputs.version }}（未签名，需使用AltStore等工具安装）"
