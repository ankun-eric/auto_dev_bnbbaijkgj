services:
  db:
    image: mysql:8.0
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: bini_health_2026
      MYSQL_DATABASE: bini_health
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: UTC
    command: --default-time-zone='+00:00'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+aiomysql://root:bini_health_2026@6b099ed3-7175-4a78-91f4-44570c84ed27-db:3306/bini_health
      SECRET_KEY: bini-health-secret-key-2026-very-secure
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-}
      AI_API_KEY: ${AI_API_KEY:-}
      TENCENT_SMS_SECRET_ID: ${TENCENT_SMS_SECRET_ID:-}
      TENCENT_SMS_SECRET_KEY: ${TENCENT_SMS_SECRET_KEY:-}
      TENCENT_SMS_SDK_APP_ID: ${TENCENT_SMS_SDK_APP_ID:-1400920269}
      TENCENT_SMS_SIGN_NAME: ${TENCENT_SMS_SIGN_NAME:-呃唉帮帮网络}
      TENCENT_SMS_TEMPLATE_ID: ${TENCENT_SMS_TEMPLATE_ID:-2201340}
      TENCENT_SMS_APP_KEY: ${TENCENT_SMS_APP_KEY:-7e3c8242bf0799cca367fa18fa47a7ea}
      # BUG ②：上传 URL 拼接的全局基础地址（含 /autodev/<deploy_id> 前缀）
      STATIC_BASE_URL: ${STATIC_BASE_URL:-https://newbb.test.bangbangvip.com/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27}
      # [2026-05-04 H5 支付链路 BasePath 修复 v1.0]
      # 后端拼支付宝 H5 沙盒收银台 pay_url / return_url 时的 H5 完整基地址。
      # 必须与 H5 构建时 NEXT_PUBLIC_BASE_PATH 同前缀（域名 + basePath）。
      PROJECT_BASE_URL: ${PROJECT_BASE_URL:-https://newbb.test.bangbangvip.com/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://newbb.test.bangbangvip.com/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-backend

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api
        - NEXT_PUBLIC_BASE_PATH=/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/admin
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api
      NEXT_PUBLIC_BASE_PATH: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/admin
      BACKEND_URL: http://6b099ed3-7175-4a78-91f4-44570c84ed27-backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-admin

  h5-web:
    build:
      context: ./h5-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api
        - NEXT_PUBLIC_BASE_PATH=/autodev/6b099ed3-7175-4a78-91f4-44570c84ed27
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-h5
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api
      NEXT_PUBLIC_BASE_PATH: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27
      BACKEND_URL: http://6b099ed3-7175-4a78-91f4-44570c84ed27-backend:8000
    expose:
      - "3001"
    depends_on:
      - backend
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-h5

volumes:
  mysql_data:
  uploads_data:

networks:
  app-network:
    name: 6b099ed3-7175-4a78-91f4-44570c84ed27-network
    driver: bridge
