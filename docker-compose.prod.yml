services:
  db:
    image: mysql:8.0
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: bini_health_2026
      MYSQL_DATABASE: bini_health
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    command: --default-time-zone='+08:00'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      app-network:
        aliases:
          - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILD_COMMIT=${BUILD_COMMIT:-unknown}
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request;urllib.request.urlopen('http://localhost:8000/api/health')\" 2>/dev/null || wget -qO- http://localhost:8000/api/health 2>/dev/null || curl -sf http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: mysql+aiomysql://root:xiaokang989aab@gz-cdb-nniq1lmp.sql.tencentcdb.com:27082/bini_health
      SECRET_KEY: bini-health-secret-key-2026-very-secure
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-}
      AI_API_KEY: ${AI_API_KEY:-}
      TENCENT_SMS_SECRET_ID: ${TENCENT_SMS_SECRET_ID:-}
      TENCENT_SMS_SECRET_KEY: ${TENCENT_SMS_SECRET_KEY:-}
      TENCENT_SMS_SDK_APP_ID: ${TENCENT_SMS_SDK_APP_ID:-1400920269}
      TENCENT_SMS_SIGN_NAME: ${TENCENT_SMS_SIGN_NAME:-呃唉帮帮网络}
      TENCENT_SMS_TEMPLATE_ID: ${TENCENT_SMS_TEMPLATE_ID:-2201340}
      TENCENT_SMS_APP_KEY: ${TENCENT_SMS_APP_KEY:-7e3c8242bf0799cca367fa18fa47a7ea}
      PAYMENT_CONFIG_ENCRYPTION_KEY: ${PAYMENT_CONFIG_ENCRYPTION_KEY:-jzsuHsRKWp/Xy01k+8d4R2lNBvb3KQTGJJkxQXRjW2A=}
      # BUG ②：上传 URL 拼接的全局基础地址（含 /autodev/<deploy_id> 前缀）
      STATIC_BASE_URL: ${STATIC_BASE_URL:-https://chat.benne-ai.com}
      # [2026-05-04 H5 支付链路 BasePath 修复 v1.0]
      # 后端拼支付宝 H5 沙盒收银台 pay_url / return_url 时的 H5 完整基地址。
      # 必须与 H5 构建时 NEXT_PUBLIC_BASE_PATH 同前缀（域名 + basePath）。
      PROJECT_BASE_URL: ${PROJECT_BASE_URL:-https://chat.benne-ai.com}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-https://chat.benne-ai.com}
      # [订单核销码状态与未支付超时治理 v1.0] 全局支付超时分钟数（默认 15）
      PAYMENT_TIMEOUT_MINUTES: ${PAYMENT_TIMEOUT_MINUTES:-15}
    volumes:
      - uploads_data:/app/uploads
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-backend

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_BASE_PATH=/admin
        - BUILD_COMMIT=${BUILD_COMMIT:-unknown}
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-admin
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/admin',r=>{process.exit(r.statusCode===200||r.statusCode===308?0:1)});setTimeout(()=>process.exit(1),3000)\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_BASE_PATH: /admin
      BACKEND_URL: http://6b099ed3-7175-4a78-91f4-44570c84ed27-backend:8000
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-admin

  h5-web:
    build:
      context: ./h5-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
        - NEXT_PUBLIC_BASE_PATH=
        - BUILD_COMMIT=${BUILD_COMMIT:-unknown}
    container_name: 6b099ed3-7175-4a78-91f4-44570c84ed27-h5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/',r=>{process.exit(r.statusCode===200||r.statusCode===308?0:1)});setTimeout(()=>process.exit(1),3000)\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_BASE_PATH: 
      BACKEND_URL: http://6b099ed3-7175-4a78-91f4-44570c84ed27-backend:8000
    expose:
      - "3001"
    depends_on:
      - backend
    networks:
      app-network:
        aliases:
          - 6b099ed3-7175-4a78-91f4-44570c84ed27-h5

volumes:
  mysql_data:
  uploads_data:

networks:
  app-network:
    name: 6b099ed3-7175-4a78-91f4-44570c84ed27-network
    driver: bridge
