# 宾尼小康 AI健康管家 - Nginx 反向代理配置
# 项目路径: /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27

# 后端 API (优先匹配，放在前面)
location /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/api {
    proxy_pass http://bini-health-backend:8000/api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    client_max_body_size 50m;
}

# 文件上传/下载
location /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/uploads {
    proxy_pass http://bini-health-backend:8000/uploads;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# 管理后台 (更具体的路径，优先匹配)
location /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27/admin {
    proxy_pass http://bini-health-admin:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

# H5 用户端 (主路径，放在最后)
location /autodev/6b099ed3-7175-4a78-91f4-44570c84ed27 {
    proxy_pass http://bini-health-h5:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}
