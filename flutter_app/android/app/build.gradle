plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.binihealth.app"
    compileSdk 35
    ndkVersion "26.1.10909125"

    defaultConfig {
        applicationId "com.binihealth.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.13.1'
            force 'androidx.core:core-ktx:1.13.1'
            force 'androidx.activity:activity:1.9.0'
            force 'androidx.activity:activity-ktx:1.9.0'
            force 'androidx.fragment:fragment:1.8.0'
            force 'androidx.fragment:fragment-ktx:1.8.0'
            force 'androidx.browser:browser:1.8.0'
            force 'androidx.lifecycle:lifecycle-runtime:2.8.0'
            force 'androidx.lifecycle:lifecycle-common:2.8.0'
            force 'androidx.lifecycle:lifecycle-viewmodel:2.8.0'
            force 'androidx.annotation:annotation:1.8.0'
            force 'androidx.savedstate:savedstate:1.2.1'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}
