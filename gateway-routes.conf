# 后端 API
location /autodev/4e9fcd9d-bf85-4aec-90d9-012ce0519a47/api/ {
    set $target_backend 4e9fcd9d-bf85-4aec-90d9-012ce0519a47-backend;
    rewrite ^/autodev/4e9fcd9d-bf85-4aec-90d9-012ce0519a47/api/(.*) /api/$1 break;
    proxy_pass http://$target_backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# 文件上传/下载
location /autodev/4e9fcd9d-bf85-4aec-90d9-012ce0519a47/uploads/ {
    set $target_backend 4e9fcd9d-bf85-4aec-90d9-012ce0519a47-backend;
    rewrite ^/autodev/4e9fcd9d-bf85-4aec-90d9-012ce0519a47/uploads/(.*) /uploads/$1 break;
    proxy_pass http://$target_backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# 管理后台
location /autodev/4e9fcd9d-bf85-4aec-90d9-012ce0519a47/admin/ {
    set $target_admin 4e9fcd9d-bf85-4aec-90d9-012ce0519a47-admin;
    proxy_pass http://$target_admin:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

