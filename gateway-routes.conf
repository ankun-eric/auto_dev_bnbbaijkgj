# ===== Project: 6b099ed3-7175-4a78-91f4-44570c84ed27 =====
# 文件位置：/home/ubuntu/gateway/conf.d/6b099ed3-7175-4a78-91f4-44570c84ed27.conf
#
# 注意：本文件中的 $connection_upgrade 变量依赖主 nginx.conf http 块中的 map 定义：
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }

server {
    listen 443 ssl http2;
    server_name 6b099ed3-7175-4a78-91f4-44570c84ed27.noob-ai.test.bangbangvip.com;

    ssl_certificate     /etc/nginx/ssl/wildcard.noob-ai.test.bangbangvip.com.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard.noob-ai.test.bangbangvip.com.key;

    # /api/ 路径 → 后端容器
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend 6b099ed3-7175-4a78-91f4-44570c84ed27-backend;
        proxy_pass http://$backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # /uploads/ 路径 → 后端容器（文件上传/下载，30天缓存）
    location /uploads/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend 6b099ed3-7175-4a78-91f4-44570c84ed27-backend;
        proxy_pass http://$backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 30d;
        add_header Cache-Control "public" always;
    }

    # /admin/ 路径 → 管理后台容器
    location /admin/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $admin 6b099ed3-7175-4a78-91f4-44570c84ed27-admin;
        proxy_pass http://$admin:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # / 路径 → H5用户端容器
    location / {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $h5 6b099ed3-7175-4a78-91f4-44570c84ed27-h5;
        proxy_pass http://$h5:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
