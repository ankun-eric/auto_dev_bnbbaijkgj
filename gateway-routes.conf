# ===== Project: 3b7b999d-e51c-4c0d-8f6e-baf90cd26857 =====

# 后端 API
location /autodev/3b7b999d-e51c-4c0d-8f6e-baf90cd26857/api/ {
    set $target_backend 3b7b999d-e51c-4c0d-8f6e-baf90cd26857-backend;
    rewrite ^/autodev/3b7b999d-e51c-4c0d-8f6e-baf90cd26857/api/(.*) /api/$1 break;
    proxy_pass http://$target_backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# 文件上传/下载
location /autodev/3b7b999d-e51c-4c0d-8f6e-baf90cd26857/uploads/ {
    set $target_backend 3b7b999d-e51c-4c0d-8f6e-baf90cd26857-backend;
    rewrite ^/autodev/3b7b999d-e51c-4c0d-8f6e-baf90cd26857/uploads/(.*) /uploads/$1 break;
    proxy_pass http://$target_backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# 管理后台
location /autodev/3b7b999d-e51c-4c0d-8f6e-baf90cd26857/admin/ {
    set $target_admin 3b7b999d-e51c-4c0d-8f6e-baf90cd26857-admin;
    proxy_pass http://$target_admin:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
}

